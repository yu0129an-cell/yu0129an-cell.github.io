        <figure class="highlight markdown"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br></pre></td><td class="code"><pre><span class="line">---</span><br><span class="line">title: 五月第一天，舵机烧了</span><br><span class="line">date: 2026-05-01</span><br><span class="line">tags:</span><br><span class="line"><span class="bullet">  -</span> 随笔</span><br><span class="line"><span class="bullet">  -</span> 实验室</span><br><span class="line"><span class="bullet">  -</span> 临安</span><br><span class="line"><span class="section">categories: 棕色硬壳笔记本</span></span><br><span class="line"><span class="section">---</span></span><br><span class="line"></span><br><span class="line">下午三点，实验室那台MG996R舵机彻底不转了。</span><br><span class="line"></span><br><span class="line">通电的瞬间闻到一股焦味，很轻，像谁在走廊尽头烫了一下头发。拆开壳子一看，驱动板上那颗MOS管黑了个角。旁边的老周探头过来，说&quot;你这都第几个了&quot;。我没接话。第三个了，我心里清楚。</span><br><span class="line"></span><br><span class="line">其实不怪舵机。怪我前天偷懒，没给供电端并一颗大电容。负载一抖，电压就塌，反复几次管子就受不了。这种错，犯一次可以叫疏忽，犯三次就是欠收拾。</span><br><span class="line"></span><br><span class="line">我把烧掉的板子搁在桌角，打算晚上拿万用表量一下周边元件有没有被连累的。然后出去走了一圈。</span><br><span class="line"></span><br><span class="line">临安今天转凉了。五月头一天，穿短袖出门居然有点后悔。梧桐大道上积了昨晚的雨水，叶子被打下来不少，贴在柏油路面上，深绿，像小时候拓印用的那种。踩上去不脆，是软的，带着水气。</span><br><span class="line"></span><br><span class="line">路过西湖边那排长椅，坐了一会儿。风确实比山脚低两度，不是体感，是那种钻进袖口、让你知道自己穿少了的凉。湖面没什么人，有个老头在钓鱼，浮漂一动不动。我俩就那么各坐各的，谁也不打扰谁。挺好。</span><br><span class="line"></span><br><span class="line">坐着的时候我琢磨琢磨那个舵机的事。其实换个更好的法子也不难——供电单独走一路，加个470μF的电解，再串个肖特基做防倒灌。不是多复杂的活，就是之前总觉得&quot;先跑起来再说&quot;，结果跑着跑着就炸了。</span><br><span class="line"></span><br><span class="line">很多事都是这样。</span><br><span class="line"></span><br><span class="line">回实验室的路上买了罐咖啡，最普通的那种黑罐。喝了一口，苦，但凉的，刚好。</span><br><span class="line"></span><br><span class="line">晚上把电容焊上去，明天再试。要是还烧，那就是我命里跟MG996R犯冲。</span><br></pre></td></tr></table></figure>
